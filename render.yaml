services:
  - type: web
    name: agence4ia
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    healthCheckPath: /fr
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: RESEND_API_KEY
        sync: false
